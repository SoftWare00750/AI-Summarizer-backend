services:
  - type: web
    name: pagemind-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: AIzaSyBaswrNTwDyeyZCvmq-zlpLP-nuPFvBRJk
        sync: false   # set this manually in Render dashboard
    healthCheckPath: /health
